<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiCam</title>
<style>
  :root {
    --bg:        #14161a;
    --bg-panel:  #1b1e23;
    --bg-hover:  #23262c;
    --border:    #2c2f36;
    --text:      #e8e9eb;
    --text-dim:  #8b8f97;
    --accent:    #3f8efc;
    --accent-bg: rgba(63, 142, 252, 0.12);
    --danger:    #e5534b;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    height: 100%;
  }
  .icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .layout {
    display: flex;
    min-height: 100vh;
  }

  /* ── Left sidebar: brand + top-level nav only ───────────────────────── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 4px;
  }
  .brand .icon {
    width: 22px;
    height: 22px;
    color: var(--accent);
  }
  .brand span {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.2px;
  }
  .section-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    padding: 0 4px;
    margin-bottom: 8px;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: transparent;
    border: none;
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 14px;
    padding: 10px 12px;
    cursor: pointer;
    text-align: left;
    transition: background 0.12s, color 0.12s;
  }
  .nav-btn:hover { background: var(--bg-hover); color: var(--text); }
  .nav-btn.active {
    background: var(--accent-bg);
    color: var(--accent);
  }
  /* Per-camera shortcuts, listed under the "Cameras" nav item — each
     jumps straight to that camera's drill-down view. */
  #sidebarCameraList {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 4px;
  }
  .nav-btn-sub {
    padding-left: 34px;
    font-size: 13px;
  }
  .nav-btn-sub .icon { width: 15px; height: 15px; }

  /* ── Shared small-control styles (reused in the drill-down bottom bar
     and right panel) ──────────────────────────────────────────────────── */
  .stream-nav {
    display: flex;
    flex-direction: row;
    gap: 4px;
  }
  .stream-nav.vertical { flex-direction: column; }
  .stream-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: none;
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 13px;
    padding: 8px 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.12s, color 0.12s;
  }
  .stream-nav.vertical .stream-btn { width: 100%; }
  .stream-btn:hover { background: var(--bg-hover); color: var(--text); }
  .stream-btn.active {
    background: var(--accent-bg);
    color: var(--accent);
  }
  .stream-btn:disabled {
    opacity: 0.4;
    cursor: default;
    pointer-events: none;
  }
  .stream-btn:disabled:hover { background: transparent; color: var(--text-dim); }
  /* Lens picker -- a dropdown of camera descriptions (Day/Night) rather
     than exclusive-select buttons, since there are exactly two mutually
     exclusive options and a select reads more like "pick one" here. */
  .settings-select {
    width: 100%;
    background: var(--bg-hover);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    padding: 8px 12px;
    cursor: pointer;
  }
  .settings-select:disabled {
    opacity: 0.4;
    cursor: default;
  }
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 8px;
  }
  .toggle-row .toggle-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .toggle-switch {
    position: relative;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
  }
  .toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .toggle-slider::before {
    content: "";
    position: absolute;
    width: 16px;
    height: 16px;
    left: 2px;
    top: 2px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.15s;
  }
  .toggle-switch input:checked + .toggle-slider {
    background: var(--accent);
  }
  .toggle-switch input:checked + .toggle-slider::before {
    transform: translateX(16px);
  }
  .toggle-switch input:disabled + .toggle-slider {
    opacity: 0.5;
    cursor: default;
  }
  /* Paired label + number input, used by the sidebar's lux threshold
     control -- same row shape as .toggle-row but with a small numeric
     input instead of a switch. */
  .lux-threshold-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 8px 12px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .lux-threshold-row input[type="number"] {
    width: 64px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    padding: 5px 8px;
  }
  .lux-threshold-row input[type="number"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
    padding: 0 4px;
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }
  .dot.live { background: #3ecf6e; }
  .dot.offline { background: var(--danger); }

  /* ── Main content area — holds EITHER the grid OR the drill-down ────── */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    padding: 24px;
  }
  .content-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .content-header .spacer { flex: 1; }
  .content-header h1 {
    font-size: 18px;
    font-weight: 500;
    margin: 0;
  }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 13px;
    padding: 7px 12px;
    cursor: pointer;
  }
  .back-btn:hover { background: var(--bg-hover); color: var(--text); }

  /* ── Camera grid ──────────────────────────────────────────────────────── */
  /* --grid-cols is computed in JS from the container's width (see
     updateGridCols()) rather than a fixed breakpoint count, so this
     keeps the old auto-fill/minmax behavior's "reasonably-sized tiles
     regardless of screen width" property while still giving each tile a
     known, wholenumber column width to size/resize against. Row height
     is a fixed unit (not content-driven) so grid-row spans behave
     predictably — GRID_GAP/ROW_HEIGHT constants in JS must stay in sync
     with the gap/grid-auto-rows values below. */
  .camera-grid {
    display: grid;
    grid-template-columns: repeat(var(--grid-cols, 4), 1fr);
    grid-auto-rows: 220px;
    gap: 16px;
  }
  .camera-tile {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, opacity 0.15s;
    display: flex;
    flex-direction: column;
    position: relative;
    /* --col-span/--row-span are set per-tile from saved layout state
       (see tileSpans in JS) — grid-column/row: span N is what actually
       makes a tile bigger/smaller; the browser's own grid auto-placement
       then reflows everything else around it, so tiles can never
       overlap without any collision-detection code of our own. */
    grid-column: span var(--col-span, 1);
    grid-row: span var(--row-span, 1);
  }
  .camera-tile:hover { border-color: var(--accent); }
  .camera-tile.dragging { opacity: 0.4; }
  .camera-tile.drag-over { border-color: var(--accent); border-style: dashed; }
  .camera-tile.resizing { border-color: var(--accent); }
  .camera-tile .thumb {
    position: relative;
    flex: 1;
    min-height: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .camera-tile .thumb img,
  .camera-tile .thumb video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .tile-resize-handle {
    position: absolute;
    bottom: 4px;
    right: 4px;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.75);
    cursor: nwse-resize;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 2;
    touch-action: none; /* this handle's own gesture is always a resize, never a scroll */
  }
  .tile-resize-handle .icon { width: 16px; height: 16px; }
  .camera-tile:hover .tile-resize-handle,
  .tile-resize-handle:focus-visible { opacity: 1; }
  @media (hover: none) {
    .tile-resize-handle { opacity: 0.7; }
  }
  .camera-tile .unavailable {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
    font-size: 12px;
  }
  .camera-tile .unavailable .icon {
    width: 28px;
    height: 28px;
    color: var(--danger);
    opacity: 0.8;
  }
  .camera-tile .tile-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    font-size: 13px;
  }
  .camera-tile .tile-footer .tile-name {
    font-weight: 500;
  }
  .camera-tile .tile-footer .dot { margin-right: 4px; }

  /* ── Drill-down: viewer only — Lens/Annotate/Overlay/Auto-switch now
     live in the sidebar's Settings section (global, not per-camera). ── */
  .viewer {
    width: 100%;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    position: relative;
    /* Without an explicit min-height, this container collapses to 0px
       tall before the <video> has any frames (height:auto on a video
       with no intrinsic size yet resolves to 0). */
    min-height: 200px;
  }
  .viewer video {
    display: block;
    width: 100%;
    height: auto;
  }
  /* Pseudo-fullscreen — a JS-toggled class rather than the native
     Fullscreen API. iOS Safari does not support requestFullscreen()
     on anything but <video> elements (it silently no-ops on a div),
     so a CSS-only "fill the viewport" approach is used everywhere
     for one consistent code path across all platforms, rather than
     a real API that only works on some browsers. */
  .viewer.pseudo-fullscreen {
    position: fixed;
    inset: 0;
    z-index: 100;
    width: 100vw;
    height: 100vh;
    border-radius: 0;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  .viewer.pseudo-fullscreen video {
    width: auto;
    height: 100%;
    max-width: 100%;
    max-height: 100vh;
    object-fit: contain;
  }
  /* Prevents the page behind from scrolling while the pseudo-fullscreen
     overlay is open — same end result as what the native API gives for
     free, but we have to do it ourselves here. */
  body.pseudo-fullscreen-active {
    overflow: hidden;
  }
  .fs-btn {
    position: absolute;
    bottom: 12px;
    right: 12px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(20, 22, 26, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s;
    z-index: 101;
  }
  .fs-btn:hover { background: rgba(20, 22, 26, 0.9); }
  .viewer:hover .fs-btn,
  .fs-btn:focus-visible {
    opacity: 1;
  }
  @media (hover: none) {
    .fs-btn { opacity: 1; }
  }
  /* Dedicated back button for pseudo-fullscreen — top-left, always
     visible while fullscreen (not hover-gated like .fs-btn above,
     since touch devices have no hover state at all and this needs
     to be a reliably discoverable way out, not something you have
     to already know to tap/hover to reveal). Hidden entirely outside
     fullscreen. */
  .fs-back-btn {
    position: absolute;
    top: 12px;
    left: 12px;
    width: 36px;
    height: 36px;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(20, 22, 26, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    z-index: 101;
    transition: background 0.15s;
  }
  .fs-back-btn:hover { background: rgba(20, 22, 26, 0.9); }
  .viewer.pseudo-fullscreen .fs-back-btn { display: flex; }
  .loading-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: var(--bg-panel);
    color: var(--text-dim);
    font-size: 13px;
    min-height: 200px;
  }
  .loading-overlay.hidden { display: none; }
  .spinner {
    width: 22px;
    height: 22px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Settings page: Lens/Annotate/Overlay/Auto-switch groups, each a
     small uppercase label + its controls, stacked with a divider
     between groups. Uses the full content-area width. */
  .settings-page {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px 16px;
  }
  .group-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    flex-shrink: 0;
    display: block;
    padding: 0 4px;
    margin-bottom: 4px;
  }
  .settings-group {
    padding: 14px 0;
  }
  .settings-group + .settings-group {
    border-top: 1px solid var(--border);
  }

  .menu-toggle {
    display: none;
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 20;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    width: 38px;
    height: 38px;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .menu-toggle .icon { width: 20px; height: 20px; }
  .overlay-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 9;
  }

  @media (max-width: 860px) {
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      z-index: 10;
      transform: translateX(-100%);
      transition: transform 0.2s ease;
      width: 220px;
    }
    .sidebar.open { transform: translateX(0); }
    .overlay-bg.open { display: block; }
    .menu-toggle { display: flex; }
    .content { padding: 64px 16px 24px; }
  }
</style>
</head>

  <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
    <svg class="icon" aria-hidden="true"><use href="#ic-menu-2"/></svg>
  </button>
  <div class="overlay-bg" id="overlayBg"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <svg class="icon" aria-hidden="true"><use href="#ic-camera-ai"/></svg>
        <span>PiCam</span>
      </div>

      <div>
        <div class="section-label">Menu</div>
        <nav class="stream-nav vertical">
          <button class="nav-btn" id="navCameras">
            <svg class="icon" aria-hidden="true"><use href="#ic-grid"/></svg>Cameras
          </button>
          <div id="sidebarCameraList">
            <!-- populated by JS from /pis.json: one shortcut per configured
                 camera, jumping straight to its drill-down view -->
          </div>
        </nav>
      </div>

      <!-- Settings: its own page (see #settingsView) -- global, applies
           to every configured Pi immediately, not scoped to whichever
           camera is currently drilled into. -->
      <div>
        <div class="section-label">Settings</div>
        <nav class="stream-nav vertical">
          <button class="nav-btn" id="navSettings">
            <svg class="icon" aria-hidden="true"><use href="#ic-settings"/></svg>Settings
          </button>
        </nav>
      </div>
    </aside>

    <main class="content">

      <!-- ══════════════════ Camera grid view ══════════════════ -->
      <div id="gridView">
        <div class="content-header">
          <h1>Cameras</h1>
          <span class="spacer"></span>
          <button class="back-btn" id="resetLayoutBtn">Reset layout</button>
        </div>
        <div class="camera-grid" id="cameraGrid">
          <!-- populated by JS from /pis.json + per-Pi health checks -->
        </div>
      </div>

      <!-- ══════════════════ Drill-down (single camera) view ══════════════════ -->
      <div id="drilldownView" style="display:none;">
        <div class="content-header">
          <button class="back-btn" id="backBtn">
            <svg class="icon" aria-hidden="true"><use href="#ic-arrow-left"/></svg>Cameras
          </button>
          <h1 id="drilldownTitle">—</h1>
        </div>

        <div class="viewer" id="viewer">
          <video id="streamVideo" autoplay muted playsinline></video>
          <div class="loading-overlay" id="loadingOverlay">
            <span class="spinner"></span>
            <span id="loadingText">Connecting…</span>
          </div>
          <button class="fs-back-btn" id="fsBackBtn" aria-label="Exit fullscreen">
            <svg class="icon" aria-hidden="true"><use href="#ic-arrow-left"/></svg>
          </button>
          <button class="fs-btn" id="fsBtn" aria-label="Toggle fullscreen">
            <svg class="icon" id="fsIcon" aria-hidden="true"><use href="#ic-maximize"/></svg>
          </button>
        </div>
      </div>

      <!-- ══════════════════ Settings page ══════════════════ -->
      <!-- Global -- every control here applies to all configured Pis
           immediately, not scoped to any one camera. -->
      <div id="settingsView" style="display:none;">
        <div class="content-header">
          <h1>Settings</h1>
        </div>

        <div class="settings-page">
          <div class="settings-group">
            <span class="group-label">Lens</span>
            <select class="settings-select" id="cameraSelect">
              <option value="0">Day</option>
              <option value="1">Night</option>
            </select>
          </div>

          <div class="settings-group">
            <span class="group-label">Annotate</span>
            <div class="toggle-row">
              <span class="toggle-label">
                <svg class="icon" aria-hidden="true"><use href="#ic-focus-2"/></svg>
                Full Stream
              </span>
              <label class="toggle-switch">
                <input type="checkbox" id="annotateMainToggle">
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="toggle-row">
              <span class="toggle-label">
                <svg class="icon" aria-hidden="true"><use href="#ic-focus-2"/></svg>
                Previews
              </span>
              <label class="toggle-switch">
                <input type="checkbox" id="annotateLoresToggle">
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>

          <div class="settings-group">
            <span class="group-label">Overlay</span>
            <div class="toggle-row">
              <span class="toggle-label">
                <svg class="icon" aria-hidden="true"><use href="#ic-camera"/></svg>
                Camera ID
              </span>
              <label class="toggle-switch">
                <input type="checkbox" id="osdCameraToggle">
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="toggle-row">
              <span class="toggle-label">
                <svg class="icon" aria-hidden="true"><use href="#ic-clock"/></svg>
                Time
              </span>
              <label class="toggle-switch">
                <input type="checkbox" id="osdTimeToggle">
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>

          <!-- Auto camera switch: the switch decision itself runs on each
               Pi's own picam-orchestrator (see that project's README) --
               this is only the remote control. Threshold is shared, but
               each Pi reads its own lux and switches its own lens. -->
          <div class="settings-group">
            <span class="group-label">Auto camera switch</span>
            <div class="toggle-row">
              <span class="toggle-label">
                <svg class="icon" aria-hidden="true"><use href="#ic-sun"/></svg>
                Enabled
              </span>
              <label class="toggle-switch">
                <input type="checkbox" id="luxSwitchToggle">
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="lux-threshold-row">
              <label for="luxThresholdInput">Threshold (lux)</label>
              <input type="number" id="luxThresholdInput" min="0" step="1">
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>
  <script>
    // ── Element references ────────────────────────────────────────────────
    const sidebar    = document.getElementById('sidebar');
    const overlayBg   = document.getElementById('overlayBg');
    const menuToggle  = document.getElementById('menuToggle');
    const navCameras  = document.getElementById('navCameras');
    const navSettings = document.getElementById('navSettings');
    const sidebarCameraList = document.getElementById('sidebarCameraList');

    const gridView      = document.getElementById('gridView');
    const drilldownView = document.getElementById('drilldownView');
    const settingsView  = document.getElementById('settingsView');
    const cameraGrid    = document.getElementById('cameraGrid');
    const resetLayoutBtn = document.getElementById('resetLayoutBtn');
    const backBtn       = document.getElementById('backBtn');
    const drilldownTitle = document.getElementById('drilldownTitle');

    const video     = document.getElementById('streamVideo');
    const viewer    = document.getElementById('viewer');
    const fsBtn     = document.getElementById('fsBtn');
    const fsBackBtn = document.getElementById('fsBackBtn');
    const fsIconUse = document.querySelector('#fsIcon use');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingText    = document.getElementById('loadingText');
    const osdCameraToggle = document.getElementById('osdCameraToggle');
    const osdTimeToggle   = document.getElementById('osdTimeToggle');
    const cameraSelect = document.getElementById('cameraSelect');
    const annotateMainToggle = document.getElementById('annotateMainToggle');
    const annotateLoresToggle = document.getElementById('annotateLoresToggle');
    const luxSwitchToggle = document.getElementById('luxSwitchToggle');
    const luxThresholdInput = document.getElementById('luxThresholdInput');

    // Track which Pi the drill-down view is watching — sent as a query
    // param to /webrtc/offer so the frontend knows which backend to
    // relay. The drill-down view always requests the "main" stream;
    // picam-orchestrator picks the actual delivered quality per client
    // based on connection quality (see webrtcsrv.Client.adaptQuality),
    // so there's no client-side stream choice to track alongside it.
    const urlParams = new URLSearchParams(window.location.search);
    let currentPi     = urlParams.get('pi') || '';
    let currentCamera = null;  // unknown until the first /status.json poll reports active_camera
    let slowHintTimer = null;
    let pisCache = [];          // last loaded /pis.json result
    let inDrilldown = false;
    let inSettings = false;

    // WebRTC connections. Unlike the old <img src="/stream">, each
    // viewer (grid tile, drill-down) is a real RTCPeerConnection that
    // must be explicitly closed — it doesn't just go away when its
    // backing DOM element is removed, so it needs its own lifecycle
    // tracking (nothing analogous existed for <img> tags).
    let drilldownPc = null;         // single connection for the detail view
    let gridPcs = new Map();        // piName -> RTCPeerConnection, for grid tiles

    // ── Grid layout: resizable/moveable tiles, persisted locally ─────────
    // GRID_GAP/ROW_HEIGHT must stay in sync with the .camera-grid CSS
    // (gap / grid-auto-rows) — both sides need the same numbers to
    // convert a resize-drag's pixel delta into a column/row span delta.
    const GRID_LAYOUT_KEY = 'picam-grid-layout';
    const GRID_GAP = 16;
    const ROW_HEIGHT = 220;
    const MIN_TILE_WIDTH = 220; // used to compute how many columns fit the container
    const MAX_ROW_SPAN = 4;
    const DRAG_THRESHOLD = 6;   // px of movement before a press becomes a reorder-drag
    const TOUCH_HOLD_MS = 250;  // touch must be held roughly still this long before a drag arms,
                                 // so an ordinary scroll/swipe on a tile isn't hijacked as a drag

    let tileSpans = new Map();  // pi name -> { colSpan, rowSpan }, current in-memory layout
    let gridCols = 4;           // recomputed by updateGridCols()
    let dragState = null;       // in-progress reorder gesture, or null
    let resizeState = null;     // in-progress resize gesture, or null
    let suppressNextClick = false; // set once a drag actually moved the tile, so the
                                    // subsequent synthetic click doesn't also open the drill-down

    // ── Sidebar (mobile drawer) ──────────────────────────────────────────
    function openSidebar()  { sidebar.classList.add('open');  overlayBg.classList.add('open'); }
    function closeSidebar() { sidebar.classList.remove('open'); overlayBg.classList.remove('open'); }
    menuToggle.addEventListener('click', openSidebar);
    overlayBg.addEventListener('click', closeSidebar);

    // ── WebRTC signaling ──────────────────────────────────────────────────
    // Performs the full WHEP-style handshake against this frontend's own
    // /webrtc/offer?pi=X&stream=Y endpoint (which relays to picam-orchestrator
    // — see the frontend's own architecture docs) and attaches the
    // resulting video track to `videoEl`. Non-trickle ICE: gathering runs
    // to completion before the offer is sent, so this is a single
    // request/response, no separate signaling channel needed — same
    // shape as every other endpoint this page already calls.
    //
    // `onFailed(pc)` fires once if the connection later drops
    // (failed/disconnected) — the caller decides what to do (grid tiles
    // show an "unavailable" placeholder; the drill-down view retries).
    async function connectWebRTC(piName, stream, videoEl, onFailed) {
      const pc = new RTCPeerConnection();
      pc.addTransceiver('video', { direction: 'recvonly' });
      pc.ontrack = (ev) => { videoEl.srcObject = ev.streams[0]; };
      pc.onconnectionstatechange = () => {
        if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
          if (onFailed) onFailed(pc);
        }
      };

      await pc.setLocalDescription(await pc.createOffer());

      // Bounded wait, not indefinite — if gathering never reaches
      // 'complete' for any reason (found the hard way: it can hang
      // forever in some environments), we proceed with whatever
      // candidates were gathered in the meantime rather than leaving the
      // viewer stuck on "Connecting…" with no way to recover. Matches
      // the backend's own 5s non-trickle gathering timeout.
      if (pc.iceGatheringState !== 'complete') {
        await new Promise((resolve) => {
          const timer = setTimeout(() => {
            pc.removeEventListener('icegatheringstatechange', check);
            resolve();
          }, 5000);
          function check() {
            if (pc.iceGatheringState === 'complete') {
              clearTimeout(timer);
              pc.removeEventListener('icegatheringstatechange', check);
              resolve();
            }
          }
          pc.addEventListener('icegatheringstatechange', check);
        });
      }

      const resp = await fetch('/webrtc/offer?pi=' + encodeURIComponent(piName) +
                                '&stream=' + encodeURIComponent(stream), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sdp: pc.localDescription.sdp })
      });
      if (!resp.ok) { pc.close(); throw new Error('signaling failed: ' + resp.status); }
      const data = await resp.json();
      if (!data.sdp) { pc.close(); throw new Error('no sdp in /webrtc/offer response'); }

      await pc.setRemoteDescription({ type: 'answer', sdp: data.sdp });
      return pc;
    }

    // ── Sidebar: per-camera shortcuts under "Cameras" ────────────────────
    // Rebuilt from whatever list last populated pisCache (grid load or
    // startup), so it reflects the same set/order the grid shows — kept
    // separate from the grid tiles themselves since the sidebar is
    // visible from both the grid and drill-down views.
    function renderSidebarCameraList(pis) {
      sidebarCameraList.innerHTML = '';
      for (const pi of pis) {
        const btn = document.createElement('button');
        btn.className = 'nav-btn nav-btn-sub';
        btn.dataset.pi = pi.name;
        btn.innerHTML = '<svg class="icon" aria-hidden="true"><use href="#ic-camera"/></svg>';
        const label = document.createElement('span');
        label.textContent = pi.label;  // textContent, not innerHTML — avoids any
                                        // HTML injection risk from a config value
        btn.appendChild(label);
        btn.addEventListener('click', () => showDrilldown(pi.name));
        sidebarCameraList.appendChild(btn);
      }
      updateSidebarActive();
    }

    // Highlights whichever sidebar shortcut matches the camera currently
    // drilled into, "Cameras" itself only while on the grid, and
    // "Settings" only on the settings page — all mutually exclusive,
    // never more than one highlighted at once.
    function updateSidebarActive() {
      navCameras.classList.toggle('active', !inDrilldown && !inSettings);
      navSettings.classList.toggle('active', inSettings);
      sidebarCameraList.querySelectorAll('.nav-btn-sub').forEach((btn) => {
        btn.classList.toggle('active', inDrilldown && btn.dataset.pi === currentPi);
      });
    }

    // Tears down the drill-down's live WebRTC connection and fullscreen
    // state — shared by any navigation away from the drill-down view
    // (to the grid or to Settings), since neither of those keeps the
    // stream connection alive.
    function leaveDrilldown() {
      drilldownView.style.display = 'none';
      if (drilldownPc) { drilldownPc.close(); drilldownPc = null; }
      video.srcObject = null;  // stop showing the last drill-down frame
      setPseudoFullscreen(false);  // don't leave the overlay/scroll-lock stuck on
    }

    // ── View switching: grid <-> drill-down <-> settings ─────────────────
    function showGrid() {
      inDrilldown = false;
      inSettings = false;
      leaveDrilldown();
      settingsView.style.display = 'none';
      gridView.style.display = '';
      // Update the URL without a reload, so back/forward + reload land
      // on the grid rather than re-opening whatever was last viewed.
      history.replaceState(null, '', window.location.pathname);
      updateSidebarActive();
      loadCameraGrid();
    }

    function showDrilldown(piName) {
      inDrilldown = true;
      inSettings = false;
      currentPi = piName;
      gridView.style.display = 'none';
      settingsView.style.display = 'none';
      drilldownView.style.display = '';
      const pi = pisCache.find(p => p.name === piName);
      drilldownTitle.textContent = pi ? pi.label : piName;
      history.replaceState(null, '', '?pi=' + encodeURIComponent(piName));
      updateSidebarActive();
      reloadStream();
      closeSidebar();
    }

    function showSettings() {
      inDrilldown = false;
      inSettings = true;
      leaveDrilldown();
      gridView.style.display = 'none';
      settingsView.style.display = '';
      history.replaceState(null, '', window.location.pathname);
      updateSidebarActive();
      closeSidebar();
    }

    navCameras.addEventListener('click', showGrid);
    navSettings.addEventListener('click', showSettings);
    backBtn.addEventListener('click', showGrid);

    // ── Grid layout: persistence ──────────────────────────────────────────
    function loadGridLayout() {
      try {
        const raw = localStorage.getItem(GRID_LAYOUT_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed.filter(e => e && typeof e.name === 'string') : [];
      } catch (e) {
        return []; // corrupt/unparseable — fall back to the default layout rather than throw
      }
    }

    function saveGridLayout() {
      const layout = pisCache.map(pi => {
        const span = tileSpans.get(pi.name) || { colSpan: 1, rowSpan: 1 };
        return { name: pi.name, colSpan: span.colSpan, rowSpan: span.rowSpan };
      });
      try {
        localStorage.setItem(GRID_LAYOUT_KEY, JSON.stringify(layout));
      } catch (e) {
        // Storage unavailable/full/disabled (private browsing, quota, ...) —
        // the layout just won't persist across reloads; not fatal.
      }
    }

    function resetGridLayout() {
      try { localStorage.removeItem(GRID_LAYOUT_KEY); } catch (e) {}
      tileSpans = new Map();
      loadCameraGrid();
    }
    resetLayoutBtn.addEventListener('click', resetGridLayout);

    function clampSpan(n, max) {
      n = Math.round(Number(n));
      if (!Number.isFinite(n) || n < 1) return 1;
      return Math.min(n, max);
    }

    // applyGridLayout reconciles the live /pis.json list against the
    // saved layout: order follows the saved layout first (for Pis that
    // still exist), then any newly-configured Pis are appended in their
    // natural order; spans come from the saved layout, defaulting to
    // 1x1 for anything not previously saved. Populates tileSpans as a
    // side effect and returns the reordered Pi list.
    function applyGridLayout(pis) {
      const saved = loadGridLayout();
      const byName = new Map(pis.map(p => [p.name, p]));

      tileSpans = new Map();
      for (const e of saved) {
        if (byName.has(e.name)) {
          tileSpans.set(e.name, { colSpan: clampSpan(e.colSpan, gridCols), rowSpan: clampSpan(e.rowSpan, MAX_ROW_SPAN) });
        }
      }

      const ordered = [];
      const remaining = new Map(byName);
      for (const e of saved) {
        const p = remaining.get(e.name);
        if (p) { ordered.push(p); remaining.delete(e.name); }
      }
      for (const p of pis) {
        if (remaining.has(p.name)) { ordered.push(p); remaining.delete(p.name); }
      }
      for (const p of pis) {
        if (!tileSpans.has(p.name)) tileSpans.set(p.name, { colSpan: 1, rowSpan: 1 });
      }
      return ordered;
    }

    // updateGridCols recomputes how many fixed-width columns currently
    // fit the grid container and publishes it as --grid-cols, so CSS
    // Grid lays tiles out at roughly MIN_TILE_WIDTH each regardless of
    // screen size — the same responsive intent the old
    // auto-fill/minmax() had, just as an explicit integer JS can also
    // use for resize-drag math (see attachResizeHandle).
    function updateGridCols() {
      const width = cameraGrid.clientWidth;
      if (!width) return; // grid not visible right now (e.g. in drill-down) — leave gridCols as-is
      gridCols = Math.max(1, Math.floor((width + GRID_GAP) / (MIN_TILE_WIDTH + GRID_GAP)));
      cameraGrid.style.setProperty('--grid-cols', String(gridCols));
    }
    let gridColsResizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(gridColsResizeTimer);
      gridColsResizeTimer = setTimeout(() => { if (!inDrilldown) updateGridCols(); }, 150);
    });

    // ── Grid layout: reorder-by-drag ────────────────────────────────────────
    // Pointer Events (not the HTML5 Drag-and-Drop API) specifically for
    // touch support — HTML5 DnD has poor/no touch support on mobile
    // browsers, and this UI is used from phones. Mouse drags arm
    // immediately on movement past DRAG_THRESHOLD; touch/pen drags
    // additionally require a short near-stationary hold first (see
    // TOUCH_HOLD_MS), so an ordinary swipe-to-scroll on a tile isn't
    // misread as a drag — if the pointer moves before the hold timer
    // fires, this bails out entirely and lets the browser's native touch
    // scrolling take over untouched (no preventDefault was ever called).
    function attachTileDrag(tile) {
      tile.addEventListener('pointerdown', (ev) => {
        if (ev.pointerType === 'mouse' && ev.button !== 0) return;
        if (ev.target.closest('.tile-resize-handle')) return;
        dragState = {
          tile, pointerId: ev.pointerId, startX: ev.clientX, startY: ev.clientY,
          dragging: false, armed: ev.pointerType === 'mouse', lastTarget: null, holdTimer: null,
        };
        if (ev.pointerType !== 'mouse') {
          dragState.holdTimer = setTimeout(() => {
            if (dragState && dragState.pointerId === ev.pointerId) dragState.armed = true;
          }, TOUCH_HOLD_MS);
        }
      });
    }

    function reorderDom(sourceTile, targetTile) {
      const tiles = Array.from(cameraGrid.children);
      if (tiles.indexOf(sourceTile) < tiles.indexOf(targetTile)) {
        targetTile.after(sourceTile);
      } else {
        targetTile.before(sourceTile);
      }
    }

    function syncPisCacheOrderFromDom() {
      const order = Array.from(cameraGrid.children).map(t => t.dataset.pi);
      pisCache.sort((a, b) => order.indexOf(a.name) - order.indexOf(b.name));
    }

    window.addEventListener('pointermove', (ev) => {
      if (!dragState || ev.pointerId !== dragState.pointerId) return;
      const dx = ev.clientX - dragState.startX;
      const dy = ev.clientY - dragState.startY;
      const moved = Math.abs(dx) >= DRAG_THRESHOLD || Math.abs(dy) >= DRAG_THRESHOLD;

      if (!dragState.dragging) {
        if (!dragState.armed) {
          if (moved) { clearTimeout(dragState.holdTimer); dragState = null; } // reads as a scroll attempt — bail, don't preventDefault
          return;
        }
        if (!moved) return;
        dragState.dragging = true;
        dragState.tile.classList.add('dragging');
        dragState.tile.setPointerCapture(dragState.pointerId);
      }

      ev.preventDefault();
      const el = document.elementFromPoint(ev.clientX, ev.clientY);
      const overTile = el ? el.closest('.camera-tile') : null;
      if (overTile !== dragState.lastTarget) {
        if (dragState.lastTarget) dragState.lastTarget.classList.remove('drag-over');
        if (overTile && overTile !== dragState.tile) overTile.classList.add('drag-over');
        dragState.lastTarget = overTile;
      }
    });

    function endTileDrag(ev) {
      if (!dragState || ev.pointerId !== dragState.pointerId) return;
      clearTimeout(dragState.holdTimer);
      const { tile, lastTarget, dragging } = dragState;
      if (lastTarget) lastTarget.classList.remove('drag-over');
      tile.classList.remove('dragging');
      if (dragging) {
        // The browser only synthesizes a trailing "click" (which this
        // flag exists to suppress) if pointerup lands back on the same
        // element pointerdown started on — after a reorder, it usually
        // doesn't (the pointer ends up over a different tile, the drop
        // target), so no click ever arrives to consume the flag. Without
        // the timeout below, it would stay stuck true and wrongly
        // swallow the next unrelated, genuine click anywhere in the grid.
        suppressNextClick = true;
        setTimeout(() => { suppressNextClick = false; }, 0);
        if (lastTarget && lastTarget !== tile) {
          reorderDom(tile, lastTarget);
          syncPisCacheOrderFromDom();
          saveGridLayout();
        }
      }
      dragState = null;
    }
    window.addEventListener('pointerup', endTileDrag);
    window.addEventListener('pointercancel', endTileDrag);

    // ── Grid layout: resize-by-drag ─────────────────────────────────────────
    function attachResizeHandle(handle, tile) {
      handle.addEventListener('pointerdown', (ev) => {
        ev.stopPropagation();
        ev.preventDefault();
        const span = tileSpans.get(tile.dataset.pi) || { colSpan: 1, rowSpan: 1 };
        resizeState = {
          tile, pointerId: ev.pointerId, startX: ev.clientX, startY: ev.clientY,
          startColSpan: span.colSpan, startRowSpan: span.rowSpan,
          liveColSpan: span.colSpan, liveRowSpan: span.rowSpan,
        };
        tile.classList.add('resizing');
        handle.setPointerCapture(ev.pointerId);
      });
      // The browser synthesizes a "click" from the mousedown/mouseup (or
      // pointer equivalent) pair independently of whether the pointerdown
      // above stopped propagation — without this, every resize gesture
      // also bubbled a click up to the tile and opened the drill-down.
      handle.addEventListener('click', (ev) => { ev.stopPropagation(); });
    }

    window.addEventListener('pointermove', (ev) => {
      if (!resizeState || ev.pointerId !== resizeState.pointerId) return;
      ev.preventDefault();
      const colWidth = (cameraGrid.clientWidth - GRID_GAP * (gridCols - 1)) / gridCols;
      const dCol = Math.round((ev.clientX - resizeState.startX) / (colWidth + GRID_GAP));
      const dRow = Math.round((ev.clientY - resizeState.startY) / (ROW_HEIGHT + GRID_GAP));
      resizeState.liveColSpan = clampSpan(resizeState.startColSpan + dCol, gridCols);
      resizeState.liveRowSpan = clampSpan(resizeState.startRowSpan + dRow, MAX_ROW_SPAN);
      resizeState.tile.style.setProperty('--col-span', resizeState.liveColSpan);
      resizeState.tile.style.setProperty('--row-span', resizeState.liveRowSpan);
    });

    function endResize(ev) {
      if (!resizeState || ev.pointerId !== resizeState.pointerId) return;
      resizeState.tile.classList.remove('resizing');
      tileSpans.set(resizeState.tile.dataset.pi, { colSpan: resizeState.liveColSpan, rowSpan: resizeState.liveRowSpan });
      saveGridLayout();
      resizeState = null;
    }
    window.addEventListener('pointerup', endResize);
    window.addEventListener('pointercancel', endResize);

    // ── Camera grid ───────────────────────────────────────────────────────
    // Each tile proactively checks /status.json for that Pi BEFORE
    // attempting any thumbnail stream — an unreachable Pi shows an
    // "unavailable" icon immediately rather than a broken-image flash
    // from a failed stream connection.
    async function buildTile(pi) {
      const tile = document.createElement('div');
      tile.className = 'camera-tile';
      tile.dataset.pi = pi.name;
      const span = tileSpans.get(pi.name) || { colSpan: 1, rowSpan: 1 };
      tile.style.setProperty('--col-span', span.colSpan);
      tile.style.setProperty('--row-span', span.rowSpan);

      const thumb = document.createElement('div');
      thumb.className = 'thumb';

      const footer = document.createElement('div');
      footer.className = 'tile-footer';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'tile-name';
      nameSpan.textContent = pi.label;  // textContent, not innerHTML — avoids any
                                        // HTML injection risk from a config value
      const pillSpan = document.createElement('span');
      pillSpan.className = 'status-pill';
      const dotSpan = document.createElement('span');
      dotSpan.className = 'dot';
      pillSpan.appendChild(dotSpan);
      footer.appendChild(nameSpan);
      footer.appendChild(pillSpan);

      const resizeHandle = document.createElement('div');
      resizeHandle.className = 'tile-resize-handle';
      resizeHandle.setAttribute('aria-hidden', 'true');
      resizeHandle.innerHTML = '<svg class="icon" aria-hidden="true"><use href="#ic-resize"/></svg>';
      attachResizeHandle(resizeHandle, tile);

      tile.appendChild(thumb);
      tile.appendChild(footer);
      tile.appendChild(resizeHandle);
      attachTileDrag(tile);
      // A plain tap/click (no real drag movement) still opens the
      // drill-down, exactly as before — suppressNextClick is only ever
      // set true by endTileDrag, right after a gesture that actually
      // moved the tile enough to reorder it.
      tile.addEventListener('click', () => {
        if (suppressNextClick) { suppressNextClick = false; return; }
        showDrilldown(pi.name);
      });

      // Operate directly on dotSpan rather than looking it up via
      // getElementById by a constructed id — the previous version did
      // that lookup BEFORE this tile was ever appended to the document
      // (buildTile runs to completion, including this whole block,
      // before loadCameraGrid appends its return value), so
      // getElementById always returned null and the dot never actually
      // changed color at all — every tile silently stayed the default
      // gray regardless of whether the Pi was reachable.
      function setDot(live) {
        dotSpan.classList.toggle('live', live);
        dotSpan.classList.toggle('offline', !live);
      }

      try {
        const resp = await fetch('/status.json?pi=' + encodeURIComponent(pi.name), { cache: 'no-store' });
        if (!resp.ok) throw new Error('bad status');
        await resp.json();  // confirms the backend actually returned valid JSON

        // Reachable — show a live Lores thumbnail (small, low bandwidth,
        // appropriate for a grid that may have many tiles at once).
        const thumbVideo = document.createElement('video');
        thumbVideo.autoplay = true;
        thumbVideo.muted = true;
        thumbVideo.playsInline = true;
        thumb.appendChild(thumbVideo);

        const pc = await connectWebRTC(pi.name, 'lores', thumbVideo, (failedPc) => {
          if (gridPcs.get(pi.name) !== failedPc) return;  // already superseded/removed
          gridPcs.delete(pi.name);
          failedPc.close();
          showUnavailable(thumb);
          setDot(false);
        });
        gridPcs.set(pi.name, pc);
        setDot(true);
      } catch (e) {
        showUnavailable(thumb);
        setDot(false);
      }

      return tile;
    }

    function showUnavailable(thumbEl) {
      thumbEl.innerHTML =
        '<div class="unavailable">' +
        '<svg class="icon" aria-hidden="true"><use href="#ic-alert-triangle"/></svg>' +
        '<span>Not available</span></div>';
    }

    async function loadCameraGrid() {
      // innerHTML='' below only destroys the DOM nodes — it does NOT
      // close the independently-alive RTCPeerConnections backing them
      // (nothing analogous was needed for <img> tags). Without this,
      // every grid refresh would leak a relay connection on
      // picam-frontend indefinitely.
      for (const pc of gridPcs.values()) pc.close();
      gridPcs.clear();
      cameraGrid.innerHTML = '';
      try {
        const resp = await fetch('/pis.json');
        const pis = await resp.json();
        if (pis.length === 0) {
          pisCache = [];
          renderSidebarCameraList(pisCache);
          cameraGrid.innerHTML =
            '<div style="color:var(--text-dim);font-size:13px;">No cameras found yet — still discovering on the LAN.</div>';
          return;
        }
        updateGridCols();
        pisCache = applyGridLayout(pis);
        renderSidebarCameraList(pisCache);
        settingsPollTick();
        for (const pi of pisCache) {
          const tile = await buildTile(pi);
          cameraGrid.appendChild(tile);
        }
      } catch (e) {
        cameraGrid.innerHTML =
          '<div style="color:var(--text-dim);font-size:13px;">Could not load camera list.</div>';
      }
    }

    // ── Drill-down: loading overlay ──────────────────────────────────────
    function showLoading() {
      loadingOverlay.classList.remove('hidden');
      loadingText.textContent = 'Connecting…';
      clearTimeout(slowHintTimer);
      slowHintTimer = setTimeout(() => {
        loadingText.textContent = 'Still waiting — check the Pi is reachable and picam-orchestrator is running';
      }, 5000);
    }
    function hideLoading() {
      loadingOverlay.classList.add('hidden');
      clearTimeout(slowHintTimer);
    }

    // ── Drill-down: stream connection ──────────────────────────────────────
    // Always requests "main" -- picam-orchestrator adapts the actually
    // delivered quality per client based on connection quality (see
    // webrtcsrv.Client.adaptQuality), so there's no client-side stream
    // choice here anymore.
    async function reloadStream() {
      showLoading();
      if (drilldownPc) { drilldownPc.close(); drilldownPc = null; }
      try {
        drilldownPc = await connectWebRTC(currentPi, 'main', video, (failedPc) => {
          if (drilldownPc !== failedPc) return;  // superseded by a newer reloadStream() call
          drilldownPc = null;
          if (!inDrilldown) return;
          showLoading();
          setTimeout(() => { if (inDrilldown) reloadStream(); }, 1000);
        });
      } catch (e) {
        if (!inDrilldown) return;
        showLoading();
        setTimeout(() => { if (inDrilldown) reloadStream(); }, 1000);
      }
    }
    video.addEventListener('playing', hideLoading);

    // ── Sidebar Settings: Lens/Annotate/Overlay/Auto-switch ─────────────
    // Unlike the old per-drilldown-camera controls, these are global —
    // a change loops through every configured Pi (pisCache) and sends
    // the same command to each, right away. There's no single "current"
    // Pi to wait on for confirmation, so these are optimistic-update-
    // and-fire: the UI updates immediately, and settingsPollTick (below)
    // self-heals it from the first configured Pi's real state if a
    // request silently failed on some Pi.
    function setActiveCamera(cameraId) {
      currentCamera = String(cameraId);
      cameraSelect.value = currentCamera;
    }

    async function broadcastCamera(cameraId) {
      setActiveCamera(cameraId);
      await Promise.all(pisCache.map(pi =>
        fetch('/camera?pi=' + encodeURIComponent(pi.name) + '&id=' + encodeURIComponent(cameraId)).catch(() => {})
      ));
    }
    cameraSelect.addEventListener('change', () => broadcastCamera(cameraSelect.value));

    // Generic global-broadcast toggle: used for the Annotate switches
    // (/annotate, main/lores), the Overlay switches (/osd,
    // camera_id/time), and the lux-switch enabled switch (/lux-switch,
    // enabled).
    function wireToggleGlobal(toggleEl, path, param) {
      toggleEl.addEventListener('change', () => {
        const wanted = toggleEl.checked;
        Promise.all(pisCache.map(pi =>
          fetch(path + '?pi=' + encodeURIComponent(pi.name) + '&' + param + '=' + wanted).catch(() => {})
        ));
      });
    }
    wireToggleGlobal(annotateMainToggle, '/annotate', 'main');
    wireToggleGlobal(annotateLoresToggle, '/annotate', 'lores');
    wireToggleGlobal(osdCameraToggle, '/osd', 'camera_id');
    wireToggleGlobal(osdTimeToggle, '/osd', 'time');

    // ── Auto camera switch: the actual lux-crossing decision runs on
    // each Pi's own picam-orchestrator (internal/luxswitch) -- this is
    // only the remote control that configures it. Threshold is shared
    // across every Pi, but each Pi reads its own lux and switches its
    // own lens independently. While enabled, the manual Lens select is
    // disabled -- different Pis can legitimately be on different
    // lenses at once under auto mode, so a single shared control
    // can't represent that truthfully, and a manual change would just
    // get overridden by the orchestrator's own next evaluation anyway.
    wireToggleGlobal(luxSwitchToggle, '/lux-switch', 'enabled');
    luxSwitchToggle.addEventListener('change', () => {
      cameraSelect.disabled = luxSwitchToggle.checked;
    });
    luxThresholdInput.addEventListener('change', () => {
      const value = luxThresholdInput.value;
      if (value === '') return;
      Promise.all(pisCache.map(pi =>
        fetch('/lux-switch?pi=' + encodeURIComponent(pi.name) + '&threshold=' + encodeURIComponent(value)).catch(() => {})
      ));
    });

    // ── Pseudo-fullscreen ─────────────────────────────────────────────────
    // Deliberately NOT using the native Fullscreen API, even though
    // .viewer now wraps a real <video> element (it used to wrap an
    // <img>, back when this was MJPEG/WebP — iOS Safari's
    // requestFullscreen() only works on <video>, so native fullscreen
    // wasn't even an option then). It's kept this way on purpose now:
    // native video fullscreen hides custom overlay controls (the
    // .fs-btn/.fs-back-btn buttons) on some browsers, and this CSS-class
    // approach (position: fixed, fills the viewport) already behaves
    // identically across every platform — not worth the cross-browser
    // risk to switch for a marginal gain.
    let pseudoFullscreen = false;

    function setPseudoFullscreen(on) {
      pseudoFullscreen = on;
      viewer.classList.toggle('pseudo-fullscreen', on);
      document.body.classList.toggle('pseudo-fullscreen-active', on);
      fsIconUse.setAttribute('href', on ? '#ic-minimize' : '#ic-maximize');
    }
    function toggleFullscreen() {
      setPseudoFullscreen(!pseudoFullscreen);
    }
    fsBtn.addEventListener('click', toggleFullscreen);
    // Dedicated back button — always exits (never toggles back in),
    // unlike fsBtn which flips state either direction. A back button
    // that sometimes re-enters fullscreen instead of exiting would be
    // a confusing affordance.
    fsBackBtn.addEventListener('click', () => setPseudoFullscreen(false));
    viewer.addEventListener('dblclick', toggleFullscreen);
    // Escape is a standard expectation for exiting fullscreen on desktop
    // — the native API provided this automatically; we have to wire it
    // up ourselves now that we're not using that API.
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && pseudoFullscreen) setPseudoFullscreen(false);
    });

    // ── Global settings poller ────────────────────────────────────────────
    // Runs unconditionally from page load, regardless of grid vs.
    // drill-down view -- Settings now lives in the sidebar, visible from
    // both. Syncs the sidebar controls from the first configured Pi's
    // /status.json as a representative state (every Pi is kept in sync by
    // the broadcast handlers above; this just self-heals the UI if one
    // silently didn't get a change, and reflects orchestrator-driven state
    // like lux-switch's own camera selection). There is no client-side
    // lux evaluation here -- that runs entirely on picam-orchestrator
    // (internal/luxswitch), so it keeps working with no browser open.
    const SETTINGS_POLL_MS = 5000;

    function syncSettingsUI(data) {
      if (typeof data.camera_id_enabled === 'boolean' && document.activeElement !== osdCameraToggle) {
        osdCameraToggle.checked = data.camera_id_enabled;
      }
      if (typeof data.time_enabled === 'boolean' && document.activeElement !== osdTimeToggle) {
        osdTimeToggle.checked = data.time_enabled;
      }
      if (typeof data.main_annotated === 'boolean' && document.activeElement !== annotateMainToggle) {
        annotateMainToggle.checked = data.main_annotated;
      }
      if (typeof data.lores_annotated === 'boolean' && document.activeElement !== annotateLoresToggle) {
        annotateLoresToggle.checked = data.lores_annotated;
      }

      const luxEnabled = data.lux_switch_enabled;
      if (typeof luxEnabled === 'boolean' && document.activeElement !== luxSwitchToggle) {
        luxSwitchToggle.checked = luxEnabled;
      }
      if (typeof data.lux_switch_threshold === 'number' && document.activeElement !== luxThresholdInput) {
        luxThresholdInput.value = data.lux_switch_threshold;
      }
      // While auto-switch is on, different Pis can legitimately be on
      // different lenses at once -- a single shared control can't
      // represent that truthfully, so it's disabled instead of synced.
      cameraSelect.disabled = !!luxEnabled;
      const t = data.telemetry || {};
      if (!luxEnabled && typeof t.active_camera === 'number') {
        setActiveCamera(t.active_camera);
      }
    }

    async function settingsPollTick() {
      if (pisCache.length === 0) return;
      try {
        const resp = await fetch('/status.json?pi=' + encodeURIComponent(pisCache[0].name));
        const data = await resp.json();
        syncSettingsUI(data);
      } catch (e) {
        // transient — retried next tick
      }
    }
    setInterval(settingsPollTick, SETTINGS_POLL_MS);

    // pisCache used to be populated once from a static config list; now
    // it's mDNS-discovered on picam-frontend and can change while this
    // page is open (a Pi joins/leaves the LAN). Poll /pis.json and, if
    // the set of known Pis actually changed, refresh: rebuild the grid
    // if it's the active view, or just keep pisCache/sidebar current
    // otherwise so broadcasts (Settings) and the next grid visit see it.
    // Matched to picam-frontend's own default discovery interval (~5s
    // worst case: 3s poll + up to a 2s response window) -- polling much
    // faster than the backend's own list can change wouldn't surface
    // anything sooner.
    const PIS_REFRESH_MS = 5000;

    async function refreshPisIfChanged() {
      try {
        const resp = await fetch('/pis.json');
        const pis = await resp.json();
        const before = pisCache.map(p => p.name).sort().join(',');
        const after = pis.map(p => p.name).sort().join(',');
        if (before === after) return;
        if (inDrilldown || inSettings) {
          pisCache = pis;
          renderSidebarCameraList(pisCache);
        } else {
          loadCameraGrid();
        }
      } catch (e) {
        // transient — retried next tick
      }
    }
    setInterval(refreshPisIfChanged, PIS_REFRESH_MS);

    // ── Startup ───────────────────────────────────────────────────────────
    if (currentPi) {
      // A pi was specified in the URL on load — go straight to the
      // drill-down for it rather than showing the grid first.
      fetch('/pis.json').then(r => r.json()).then(pis => {
        pisCache = pis;
        renderSidebarCameraList(pisCache);
        showDrilldown(currentPi);
        settingsPollTick();
      }).catch(() => { showGrid(); });
    } else {
      showGrid();
    }
  </script>
</body>
</html>
